name: Fetch Gradi products

on:
  push:
    paths:
      - '.github/workflows/fetch-gradihandmade-products.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-products:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Fetch Shopify products
        run: |
          mkdir -p assets/judgeme-data
          curl --fail --location --retry 3 'https://www.gradihandmade.com/products.json?limit=250' -o assets/judgeme-data/products.json
      - name: Commit product feed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/judgeme-data/products.json
          git diff --cached --quiet || git commit -m 'Fetch product catalog for Judge.me import'
          git push
