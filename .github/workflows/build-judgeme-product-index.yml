name: Build Judge.me product index

on:
  push:
    paths:
      - '.github/workflows/build-judgeme-product-index.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build product TSV
        run: |
          mkdir -p assets/judgeme-data
          jq -r '.products[] | [.id, .title, .handle, ((.images[0].src // ""))] | @tsv' assets/judgeme-data/products.json > assets/judgeme-data/products.tsv
      - name: Commit product index
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add assets/judgeme-data/products.tsv
          git diff --cached --quiet || git commit -m 'Build product index for Judge.me import'
          git push
